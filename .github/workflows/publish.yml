name: Publish

# Push a version tag to build, package, and publish to the marketplaces:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Azure DevOps PAT with Marketplace > Manage scope (required)
#   OVSX_PAT  — Open VSX access token (optional; step is skipped if unset)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG"

      - name: Build themes
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --out "linear-theme-vscode-${GITHUB_REF_NAME#v}.vsix"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath "linear-theme-vscode-${GITHUB_REF_NAME#v}.vsix"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish "linear-theme-vscode-${GITHUB_REF_NAME#v}.vsix" -p "$OVSX_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "linear-theme-vscode-*.vsix"
          generate_release_notes: true
